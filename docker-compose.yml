version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: payment_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zzz500zzz}
      POSTGRES_DB: ${POSTGRES_DB:-payment_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - payment_network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: payment_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - payment_network

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: payment_api
    environment:
      POSTGRES_HOST: postgres
      RABBITMQ_HOST: rabbitmq
      API_KEY: ${API_KEY:-secret_api_key}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - payment_network

  consumer:
    build:
      context: .
      dockerfile: docker/consumer.Dockerfile
    container_name: payment_consumer
    environment:
      POSTGRES_HOST: postgres
      RABBITMQ_HOST: rabbitmq
      API_KEY: ${API_KEY:-secret_api_key}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: python -m app.consumers.payment_consumer
    networks:
      - payment_network

networks:
  payment_network:
    driver: bridge

volumes:
  postgres_data: